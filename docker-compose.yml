services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        echo "Waiting for ollama..."
        until wget -qO- http://localhost:11434/ >/dev/null 2>&1; do sleep 1; done
        echo "ollama ready — ensuring phi3:mini is present..."
        ollama pull phi3:mini
        echo "phi3:mini ready."
        wait
    # /api/tags only returns 200 once the server is fully initialised.
    # start_period=30s gives ollama time to finish GPU discovery before
    # checks begin — prevents false unhealthy during the ~1s init window.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:11434/api/tags >/dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 3500m

  app:
    build:
      context: .
      args:
        GPU: 0
    ports:
      - "8000:8000"
    volumes:
      - ./output:/app/output
      - whisperx_cache:/root/.cache/whisper
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 6g

volumes:
  ollama_data:
  whisperx_cache:
