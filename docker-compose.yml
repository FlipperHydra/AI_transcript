services:

  # ── Ollama LLM server ──────────────────────────────────────────────────────
  # Runs the official image completely stock — no entrypoint override,
  # no command override, no shell variable escaping. The image's own
  # ENTRYPOINT ["/bin/ollama"] CMD ["serve"] fires as intended.
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Healthcheck calls the ollama binary directly — no shell, no wget,
    # no grep. `ollama show` returns 0 only when the model is present and
    # the server is serving. This is the pattern from the ollama issue tracker.
    healthcheck:
      test: ["CMD", "ollama", "show", "gemma3:270m"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 3500m

  # ── Model loader (sidecar) ─────────────────────────────────────────────────
  # Runs once, pulls gemma3:270m via the REST API, then exits with code 0.
  # On subsequent starts the model is already in the volume — the pull call
  # returns instantly. No shell variable escaping, no PID tracking, no hacks.
  model-loader:
    image: busybox:latest
    volumes:
      - ./ollama-init.sh:/ollama-init.sh:ro
    entrypoint: ["/bin/sh", "/ollama-init.sh"]
    depends_on:
      - ollama
    restart: "no"

  # ── FastAPI app ────────────────────────────────────────────────────────────
  # Starts only after ollama is healthy (server up + gemma3:270m present)
  # AND model-loader has exited cleanly (model confirmed pulled).
  app:
    build:
      context: .
      args:
        GPU: 0
    ports:
      - "8000:8000"
    volumes:
      - ./output:/app/output
      - whisperx_cache:/root/.cache/whisper
      - torch_cache:/root/.cache/torch
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
      model-loader:
        condition: service_completed_successfully
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 6g

volumes:
  ollama_data:
  whisperx_cache:
  torch_cache:
